<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101a"/><stop offset="1" stop-color="#050a12"/>
    </linearGradient>
    <radialGradient id="g1" cx="16%" cy="0%" r="60%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="88%" cy="10%" r="58%">
      <stop offset="0" stop-color="#f6465d" stop-opacity="0.20"/><stop offset="1" stop-color="#f6465d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cffafe"/><stop offset="0.55" stop-color="#2dd4bf"/><stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1a22"/><stop offset="1" stop-color="#1a0d12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#g1)"/>
  <rect width="1200" height="320" fill="url(#g2)"/>
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/><line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Map / network motif (right) -->
  <g opacity="0.9">
    <g stroke="#2dd4bf" stroke-width="1.4" opacity="0.35">
      <line x1="760" y1="120" x2="900" y2="200"/><line x1="900" y1="200" x2="1040" y2="110"/>
      <line x1="760" y1="120" x2="1000" y2="230"/><line x1="900" y1="200" x2="1110" y2="180"/>
    </g>
    <!-- pulse ring around alert pin -->
    <circle cx="900" cy="200" r="34" fill="none" stroke="#f6465d" stroke-width="2" opacity="0.5"/>
    <circle cx="900" cy="200" r="52" fill="none" stroke="#f6465d" stroke-width="1.5" opacity="0.22"/>
    <!-- pins -->
    <g>
      <path d="M900 178 a16 16 0 1 1 -0.1 0 Z M900 232 l-12 -22 a14 14 0 0 1 24 0 Z" fill="#f6465d"/>
      <circle cx="900" cy="194" r="6" fill="#1a0d12"/>
      <path d="M760 104 a13 13 0 1 1 -0.1 0 Z M760 150 l-10 -19 a12 12 0 0 1 20 0 Z" fill="#2dd4bf"/>
      <circle cx="760" cy="118" r="5" fill="#07101a"/>
      <path d="M1040 96 a13 13 0 1 1 -0.1 0 Z M1040 142 l-10 -19 a12 12 0 0 1 20 0 Z" fill="#38bdf8"/>
      <circle cx="1040" cy="110" r="5" fill="#07101a"/>
      <path d="M1100 168 a11 11 0 1 1 -0.1 0 Z M1100 208 l-9 -17 a10 10 0 0 1 18 0 Z" fill="#fbbf24"/>
      <circle cx="1100" cy="180" r="4.5" fill="#07101a"/>
    </g>
  </g>

  <!-- Logo emblem -->
  <g>
    <rect x="60" y="112" width="58" height="58" fill="url(#lg)"/>
    <rect x="60" y="112" width="58" height="58" fill="none" stroke="url(#title)" stroke-width="2"/>
    <rect x="60" y="112" width="58" height="3" fill="#2dd4bf"/>
    <path d="M89 126 a14 14 0 1 1 -0.1 0 Z M89 166 l-11 -20 a13 13 0 0 1 22 0 Z" fill="#f6465d"/>
    <circle cx="89" cy="141" r="5.5" fill="#0b1a22"/>
  </g>

  <text x="138" y="146" font-size="44" font-weight="800" fill="url(#title)" letter-spacing="-1">Onboard Alert</text>
  <text x="140" y="182" font-size="17.5" fill="#9fb4c4">Location-aware crisis &amp; live-news monitoring platform for Turkey</text>

  <g font-size="12.5" font-weight="600" font-family="JetBrains Mono, monospace">
    <rect x="140" y="204" width="150" height="28" fill="none" stroke="#2dd4bf" opacity="0.5"/>
    <text x="215" y="223" fill="#7fe0d4" text-anchor="middle">REACT + LEAFLET</text>
    <rect x="300" y="204" width="172" height="28" fill="none" stroke="#38bdf8" opacity="0.5"/>
    <text x="386" y="223" fill="#9ad8ff" text-anchor="middle">EXPRESS + POSTGRES</text>
    <rect x="482" y="204" width="120" height="28" fill="none" stroke="#f6465d" opacity="0.5"/>
    <text x="542" y="223" fill="#ffabb6" text-anchor="middle">CRISIS MAP</text>
  </g>
</svg>
